<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Catalog — Каталог нейросетей</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
<header class="header">
    <div class="header__inner">
        <div class="header__left">
            <a href="/" class="logo">
                <span class="logo__icon">AI</span>
                AI Catalog
            </a>
            <nav class="nav">
                <a href="/">Каталог</a>
                <a href="/neuronets/top">Топ</a>
            </nav>
        </div>
        <div class="header__right">
            <a href="/users/login" class="btn btn--ghost btn--sm">Войти</a>
            <a href="/users/register" class="btn btn--primary btn--sm">Регистрация</a>
        </div>
    </div>
</header>

<!-- ТОП-5 статичный -->
<div class="top-section" th:if="${topNeuronets != null && !topNeuronets.empty}">
    <div class="section" style="margin-bottom: 0;">
        <div class="section__header">
            <h2 class="section__title">Лидеры рейтинга</h2>
            <a href="/neuronets/top" class="section__link">Смотреть все</a>
        </div>
        <div class="top-bar">
            <a th:each="neuronet, iterStat : ${topNeuronets}"
               th:href="@{/neuronets/{id}(id=${neuronet.idNeuronet})}"
               class="top-card">
                <span class="top-card__position" th:text="${iterStat.index + 1}">1</span>
                <img th:src="${neuronet.neuronetIcon}" class="top-card__icon" alt="">
                <div class="top-card__info">
                    <div class="top-card__name" th:text="${neuronet.name}">Name</div>
                    <div class="top-card__rating">★ 0.0</div>
                </div>
            </a>
        </div>
    </div>
</div>

<!-- ВСЁ ОСТАЛЬНОЕ — HTMX-фрагмент -->
<div id="main-area">
    <th:block th:include="~{fragments/main-area :: mainArea}"></th:block>
</div>
<footer class="footer">
    <div class="footer__inner">
        <div class="footer__col">
            <h4>О проекте</h4>
            <p>AI Catalog — каталог нейросетей с честными оценками и отзывами.</p>
        </div>
        <div class="footer__col">
            <h4>Навигация</h4>
            <a href="/">Каталог</a>
            <a href="/neuronets/top">Топ нейросетей</a>
        </div>
        <div class="footer__col">
            <h4>Контакты</h4>
            <a href="mailto:hello@aicatalog.ru">hello@aicatalog.ru</a>
        </div>
    </div>
    <div class="footer__bottom">
        <span>&copy; 2026 AI Catalog</span>
    </div>
</footer>
<script>
    var pendingScroll = null;

    document.body.addEventListener('htmx:beforeRequest', function(evt) {
        var el = evt.target;
        pendingScroll = el.getAttribute ? el.getAttribute('data-scroll-to') : null;
    });

    document.body.addEventListener('htmx:afterSwap', function() {
        if (pendingScroll === '' || pendingScroll === null || pendingScroll === undefined) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            var target = document.getElementById(pendingScroll);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        pendingScroll = null;
    });
</script>
<script src="/js/particles.js"></script>
</body>
</html>
