<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — AI Catalog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
<!-- HEADER -->
<header class="header">
    <div class="header__inner">
        <div class="header__left">
            <a href="/" class="logo">
                <span class="logo__icon">AI</span>
                AI Catalog
            </a>
            <nav class="nav">
                <a href="/">Каталог</a>
                <a href="/neuronets/top">Топ</a>
            </nav>
        </div>
        <div class="header__right">
            <a href="/users/login" class="btn btn--ghost btn--sm">Войти</a>
        </div>
    </div>
</header>

<!-- MAIN -->
<main class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-card__title">Регистрация</h1>
        <p class="auth-card__subtitle">Создайте аккаунт, чтобы оценивать нейросети и оставлять отзывы</p>

        <form th:action="@{/users/register}" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required
                       placeholder="Придумайте имя" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required
                       placeholder="your@email.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required
                       placeholder="Минимум 6 символов" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Подтвердите пароль</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       placeholder="Повторите пароль" autocomplete="new-password">
            </div>

            <div th:if="${error}" class="auth-error" th:text="${error}"></div>

            <button type="submit" class="btn btn--primary auth-form__btn">Зарегистрироваться</button>
        </form>

        <p class="auth-card__footer">
            Уже есть аккаунт? <a href="/users/login">Войти</a>
        </p>
    </div>
</main>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer__inner">
        <div class="footer__col">
            <h4>О проекте</h4>
            <p>AI Catalog — каталог нейросетей с честными оценками и отзывами.</p>
        </div>
        <div class="footer__col">
            <h4>Навигация</h4>
            <a href="/">Каталог</a>
            <a href="/neuronets/top">Топ нейросетей</a>
        </div>
        <div class="footer__col">
            <h4>Контакты</h4>
            <a href="mailto:hello@aicatalog.ru">hello@aicatalog.ru</a>
        </div>
    </div>
    <div class="footer__bottom">
        <span>&copy; 2026 AI Catalog</span>
    </div>
</footer>
</body>
</html>
