<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="reviews">
    <h3>Отзывы</h3>
    <div class="review" th:each="review : ${reviews}">
        <div class="review__header">
            <span class="review__user" th:text="${review.user?.username}">Пользователь</span>
            <span class="review__stars">
                <span th:each="star : ${#numbers.sequence(1, review.rating)}">★</span>
            </span>
            <span class="review__date" th:text="${#temporals.format(review.createdAt, 'dd.MM.yyyy')}">01.01.2026</span>
        </div>
        <p class="review__text" th:if="${review.comment != null}" th:text="${review.comment}"></p>
        <p class="review__text review__text--empty" th:unless="${review.comment != null}">Без комментария</p>

        <div class="review-votes">
            <form method="post"
                  hx-post="/reviews/vote"
                  hx-target="#reviews-container"
                  hx-swap="innerHTML"
                  hx-include="this"
                  style="display:inline">
                <input type="hidden" name="userId" value="1">
                <input type="hidden" name="vote" value="1">
                <input type="hidden" name="neuronetId" th:value="${neuronet.idNeuronet}">
                <input type="hidden" name="reviewId" th:value="${review.idReview}">
                <button type="submit" class="vote-btn">👍 <span th:text="${likeScores[review.idReview] != null ? likeScores[review.idReview] : 0}">0</span></button>
            </form>
            <form method="post"
                  hx-post="/reviews/vote"
                  hx-target="#reviews-container"
                  hx-swap="innerHTML"
                  hx-include="this"
                  style="display:inline">
                <input type="hidden" name="userId" value="1">
                <input type="hidden" name="vote" value="-1">
                <input type="hidden" name="neuronetId" th:value="${neuronet.idNeuronet}">
                <input type="hidden" name="reviewId" th:value="${review.idReview}">
                <button type="submit" class="vote-btn">👎 <span th:text="${dislikeScores[review.idReview] != null ? dislikeScores[review.idReview] : 0}">0</span></button>
            </form>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(reviews)}" class="review-card__empty">
        Пока нет отзывов. Будьте первым!
    </div>
</th:block>
</body>
</html>
