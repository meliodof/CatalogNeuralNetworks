<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="mainArea">
    <main class="container layout">
        <aside class="sidebar">
            <div class="sidebar__header">
                <span class="sidebar__title">Категории</span>
                <span class="sidebar__count" th:text="${#lists.size(categories)}">0</span>
            </div>
            <ul class="sidebar__list">
                <li>
                    <a th:attr="hx-get=@{/(availableInRussia=${availableInRussia}, sortByRating=${sortByRating}, search=${search}, pricing=${pricing})},data-scroll-to=''"
                       hx-target="#main-area"
                       hx-swap="innerHTML"
                       hx-push-url="true"
                       th:classappend="${selectedCategoryId == null ? 'active' : ''}">Все нейросети</a>
                </li>
                <li th:each="category : ${categories}">
                    <a th:attr="hx-get=@{/(categoryId=${category.idCategories}, availableInRussia=${availableInRussia}, sortByRating=${sortByRating}, search=${search}, pricing=${pricing})},data-scroll-to='cat-' + ${category.idCategories}"
                       hx-target="#main-area"
                       hx-swap="innerHTML"
                       hx-push-url="true"
                       th:text="${category.name}"
                       th:classappend="${selectedCategoryId != null && selectedCategoryId == category.idCategories ? 'active' : ''}"></a>
                </li>
            </ul>
        </aside>

        <section class="content">
            <div class="search-bar">
                <form th:attr="hx-get=@{/}"
                      hx-target="#main-area"
                      hx-swap="innerHTML"
                      hx-push-url="true"
                      class="search-form">
        <span class="search-form__icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
                    <input type="hidden" name="categoryId" th:value="${selectedCategoryId}">
                    <input type="hidden" name="availableInRussia" th:value="${availableInRussia}">
                    <input type="hidden" name="sortByRating" th:value="${sortByRating ? 'true' : ''}">
                    <input type="hidden" name="pricing" th:value="${pricing}">
                    <input type="text" name="search" th:value="${search}" placeholder="Поиск нейросетей...">
                    <button type="submit">Найти</button>
                </form>
            </div>

            <div class="filter-bar">
                <span class="filter-bar__label">Фильтры</span>
                <a th:attr="hx-get=${availableInRussia != null && availableInRussia} ? @{/(availableInRussia=${null}, sortByRating=${sortByRating}, categoryId=${selectedCategoryId}, search=${search}, pricing=${pricing})} : @{/(availableInRussia=true, sortByRating=${sortByRating}, categoryId=${selectedCategoryId}, search=${search}, pricing=${pricing})}"
                   hx-target="#main-area"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="chip" th:classappend="${availableInRussia != null && availableInRussia ? 'active' : ''}">Доступны в РФ</a>
                <a th:attr="hx-get=${availableInRussia != null && !availableInRussia} ? @{/(availableInRussia=${null}, sortByRating=${sortByRating}, categoryId=${selectedCategoryId}, search=${search}, pricing=${pricing})} : @{/(availableInRussia=false, sortByRating=${sortByRating}, categoryId=${selectedCategoryId}, search=${search}, pricing=${pricing})}"
                   hx-target="#main-area"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="chip" th:classappend="${availableInRussia != null && !availableInRussia ? 'active' : ''}">Требуют VPN</a>
                <a th:attr="hx-get=${sortByRating} ? @{/(sortByRating=${false}, availableInRussia=${availableInRussia}, categoryId=${selectedCategoryId}, search=${search}, pricing=${pricing})} : @{/(sortByRating=true, availableInRussia=${availableInRussia}, categoryId=${selectedCategoryId}, search=${search}, pricing=${pricing})}"
                   hx-target="#main-area"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="chip chip--sort" th:classappend="${sortByRating ? 'active' : ''}">По рейтингу</a>
                <a th:attr="hx-get=${pricing != null && pricing == 'free'} ? @{/(pricing=${null}, availableInRussia=${availableInRussia}, sortByRating=${sortByRating}, categoryId=${selectedCategoryId}, search=${search})} : @{/(pricing='free', availableInRussia=${availableInRussia}, sortByRating=${sortByRating}, categoryId=${selectedCategoryId}, search=${search})}"
                   hx-target="#main-area"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="chip" th:classappend="${pricing != null && pricing == 'free' ? 'active' : ''}">Бесплатные</a>
                <a th:attr="hx-get=${pricing != null && pricing == 'paid'} ? @{/(pricing=${null}, availableInRussia=${availableInRussia}, sortByRating=${sortByRating}, categoryId=${selectedCategoryId}, search=${search})} : @{/(pricing='paid', availableInRussia=${availableInRussia}, sortByRating=${sortByRating}, categoryId=${selectedCategoryId}, search=${search})}"
                   hx-target="#main-area"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="chip" th:classappend="${pricing != null && pricing == 'paid' ? 'active' : ''}">Платные</a>
                <a th:attr="hx-get=@{/(availableInRussia=${null}, sortByRating=${false}, pricing=${null}, categoryId=${selectedCategoryId}, search=${null})}"
                   hx-target="#main-area"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="btn btn--ghost btn--sm" style="margin-left: auto;">Сбросить</a>
            </div>

            <th:block th:replace="~{fragments/catalog :: catalog}"></th:block>
        </section>
    </main>
</th:block>
</body>
</html>
